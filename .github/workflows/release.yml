name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Build Windows NSIS (.exe)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            src-tauri -> target

      - name: Install npm dependencies
        run: |
          npm ci
          npm --prefix frontend ci

      - name: Build Tauri NSIS installer
        run: npm run tauri:build -- --bundles nsis

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis
          path: |
            target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  build-linux:
    name: Build Linux DEB (.deb)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            src-tauri -> target

      - name: Install npm dependencies
        run: |
          npm ci
          npm --prefix frontend ci

      - name: Build Tauri DEB package
        run: npm run tauri:build -- --bundles deb

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: |
            target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error

  package-extension:
    name: Package browser extension (.zip)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install zip
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Package extension
        run: bash tools/package-browser-extension.sh

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: browser-extension
          path: dist/coter-cookie-bridge.zip
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs: [build-windows, build-linux, package-extension]
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Flatten release assets
        run: |
          mkdir -p upload
          find release-assets -type f \( -name '*.exe' -o -name '*.deb' -o -name '*.zip' \) -print -exec cp -v {} upload/ \;
          ls -lah upload
          test "$(find upload -type f | wc -l)" -ge 3

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: upload/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
