name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Build Windows NSIS (.exe)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            src-tauri -> target

      - name: Install npm dependencies
        run: |
          npm ci
          npm --prefix frontend ci

      - name: Build Tauri NSIS installer
        run: npm run tauri:build -- --bundles nsis

      - name: Stage flat Windows installer
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-dist
          shopt -s nullglob
          files=(
            target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe
          )
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No NSIS .exe found" >&2
            find target src-tauri/target -type f -name '*.exe' 2>/dev/null | head -50 || true
            exit 1
          fi
          src="${files[0]}"
          cp -v "$src" "release-dist/$(basename "$src")"
          ls -lah release-dist

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis
          path: release-dist/*
          if-no-files-found: error
          compression-level: 0

  build-linux:
    name: Build Linux DEB (.deb)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            src-tauri -> target

      - name: Install npm dependencies
        run: |
          npm ci
          npm --prefix frontend ci

      - name: Build Tauri DEB package
        run: npm run tauri:build -- --bundles deb

      - name: Stage flat Linux deb
        run: |
          set -euo pipefail
          mkdir -p release-dist
          shopt -s nullglob
          files=(
            target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/deb/*.deb
          )
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No .deb found" >&2
            find target src-tauri/target -type f -name '*.deb' 2>/dev/null | head -50 || true
            exit 1
          fi
          src="${files[0]}"
          cp -v "$src" "release-dist/$(basename "$src")"
          ls -lah release-dist

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: release-dist/*
          if-no-files-found: error
          compression-level: 0

  package-extension:
    name: Package browser extension (.zip)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install zip
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Package extension
        run: bash tools/package-browser-extension.sh

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: browser-extension
          path: dist/coter-cookie-bridge.zip
          if-no-files-found: error
          compression-level: 0

  publish-release:
    name: Publish GitHub Release
    needs: [build-windows, build-linux, package-extension]
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Prepare release files
        run: |
          set -euo pipefail
          mkdir -p upload
          # merge-multiple 已把各 artifact 打到同一目录；再保险扫一层子目录
          find release-assets -type f \( -name '*.exe' -o -name '*.deb' -o -name '*.zip' \) -print0 \
            | while IFS= read -r -d '' f; do
                cp -v "$f" "upload/$(basename "$f")"
              done
          echo "Release files:"
          ls -lah upload
          test -n "$(find upload -maxdepth 1 -type f -name '*.exe' | head -1)"
          test -n "$(find upload -maxdepth 1 -type f -name '*.deb' | head -1)"
          test -n "$(find upload -maxdepth 1 -type f -name '*.zip' | head -1)"
          # 每个类型只保留一个文件，避免重复上传
          count_exe=$(find upload -maxdepth 1 -type f -name '*.exe' | wc -l)
          count_deb=$(find upload -maxdepth 1 -type f -name '*.deb' | wc -l)
          count_zip=$(find upload -maxdepth 1 -type f -name '*.zip' | wc -l)
          echo "counts: exe=$count_exe deb=$count_deb zip=$count_zip"
          test "$count_exe" -eq 1
          test "$count_deb" -eq 1
          test "$count_zip" -eq 1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            upload/*.exe
            upload/*.deb
            upload/*.zip
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
